# アプリケーション名
spring.application.name=hayashitravel

# データベースへの接続URL (localhost:3306 の後にデータベース名を指定)
spring.datasource.url=jdbc:mysql://localhost:3306/hayashi_travel_db?serverTimezone=JST&useSSL=false

# ユーザー名とパスワード
spring.datasource.username=root
spring.datasource.password=hide0722

# JDBCドライバの指定
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 初期化設定
spring.sql.init.encoding=utf-8
spring.sql.init.mode=always