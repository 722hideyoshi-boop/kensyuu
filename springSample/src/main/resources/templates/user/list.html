<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ユーザー一覧</title>
	<link rel="stylesheet" th:href="@{/css/list.css}">
</head>

<body>
	<h1>ユーザー一覧</h1>

	<table>
		<thead>
			<tr>
				<th>ID</th>
				<th>名前</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="user : ${users}">
				<td th:text="${user.id}">1</td>
				<td th:text="${user.name}">山田太郎</td>
			</tr>
		</tbody>
	</table>
</body>

</html>
